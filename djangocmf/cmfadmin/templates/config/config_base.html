{% extends 'admin/base_site.html' %}
{% load i18n %}

{% block page_header %}
    <div class="row g-2 align-items-center">
        <div class="col">
            <!-- Page pre-title -->
            <div class="page-pretitle">{% block page_subtitle %}{{ opts.model_name }}{% endblock %}</div>
            <h2 class="page-title">{% block page_title %}{{ title }}{% endblock %}</h2>
        </div>
        <div class="col-auto ms-auto d-print-none">
            {% block page_right %}{% endblock %}
        </div>
    </div>
{% endblock %}
