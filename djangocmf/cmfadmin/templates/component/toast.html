<!-- Toast container — cloned for each notification, cleaned up after hide -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div class="toast fade toast-template" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <strong class="me-auto text-white toast-title"></strong>
            <small class="toast-tip"></small>
            <button type="button" class="ms-2 btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body toast-message"></div>
    </div>
</div>
{% if messages %}
    <script>
        /**
         * Auto-display Django messages
         * Runs after DOMContentLoaded so the toast container is guaranteed to exist.
         */
        document.addEventListener('DOMContentLoaded', function () {
            {% for msg in messages %}
                (function () {
                    const rawExtra = '{{ msg.extra_tags|default:""|escapejs }}';
                    const extras   = parseExtras(rawExtra);

                    // Ensure delay is numeric — Django may pass it as a string.
                    if (extras.delay) extras.delay = Number(extras.delay);

                    showToast("{{ msg.message|escapejs }}", "{{ msg.level_tag|lower }}", extras);
                })();
            {% endfor %}
        });
    </script>
{% endif %}
