{% load static i18n %}

<link rel="stylesheet" href="{% static 'libs/cropperjs/cropper.min.css' %}">

<!-- Cropper Modal -->
<div class="modal modal-blur fade" id="cropperModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{% translate "Crop Image" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-3">
                <input type="file" id="cropperFileInput" accept="image/*" class="d-none">

                <div class="row">
                    <!-- Image container -->
                    <div class="col-md-8 mb-3 mb-md-0 text-center">
                        <img id="cropperImage" class="img-fluid d-none" alt="Crop Preview">
                    </div>

                    <!-- Controls -->
                    <div class="col-md-4 d-flex flex-column gap-2 ps-md-3">
                        <!-- Aspect Ratio Button Group -->
                        <label class="form-label">{% translate "Crop Ratio" %}</label>
                        <div class="btn-group w-100 mb-2" role="group">
                            <input type="radio" class="btn-check" name="aspectRatio" id="ratio-1-1" value="1" autocomplete="off">
                            <label class="btn btn-outline-secondary" for="ratio-1-1">1:1</label>

                            <input type="radio" class="btn-check" name="aspectRatio" id="ratio-16-9" value="1.7777777777777777"
                                   autocomplete="off">
                            <label class="btn btn-outline-secondary" for="ratio-16-9">16:9</label>

                            <input type="radio" class="btn-check" name="aspectRatio" id="ratio-4-3" value="1.3333333333333333"
                                   autocomplete="off">
                            <label class="btn btn-outline-secondary" for="ratio-4-3">4:3</label>

                            <input type="radio" class="btn-check" name="aspectRatio" id="ratio-2-3" value="0.6666666666666666"
                                   autocomplete="off">
                            <label class="btn btn-outline-secondary" for="ratio-2-3">2:3</label>

                            <input type="radio" class="btn-check" name="aspectRatio" id="ratio-free" value="NaN" autocomplete="off" checked>
                            <label class="btn btn-outline-secondary" for="ratio-free">{% translate "Free" %}</label>
                        </div>

                        <!-- Other Actions -->
                        <button type="button" class="btn btn-outline-secondary" data-action="rotate-left">
                            ⟲ {% translate "Rotate Left" %}</button>
                        <button type="button" class="btn btn-outline-secondary" data-action="rotate-right">
                            ⟳ {% translate "Rotate Right" %}</button>
                        <button type="button" class="btn btn-outline-secondary" data-action="flip-horizontal">
                            ⇋ {% translate "Flip H" %}</button>
                        <button type="button" class="btn btn-outline-secondary" data-action="flip-vertical">
                            ⇵ {% translate "Flip V" %}</button>
                        <button type="button" class="btn btn-outline-secondary" data-action="zoom-in">
                            ＋ {% translate "Zoom In" %}</button>
                        <button type="button" class="btn btn-outline-secondary" data-action="zoom-out">
                            － {% translate "Zoom Out" %}</button>

                        <label class="form-check form-switch form-switch-3 mt-2">
                            <input type="checkbox" class="form-check-input" id="use-original">
                            <span class="form-check-label">{% translate "Use Original Dimensions" %}</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% translate "Cancel" %}</button>
                <button type="button" class="btn btn-primary" id="cropperSaveBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
                    {% translate "Confirm and Upload" %}
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    #cropperModal .modal-body {
        max-height: 80vh;
        overflow: hidden;
    }

    #cropperModal #cropperImage {
        max-height: 100%;
        max-width: 100%;
        width: auto;
    }
</style>

<script src="{% static 'libs/cropperjs/cropper.min.js' %}"></script>
<script src="{% static 'admin/js/components/cropper.js' %}"></script>
