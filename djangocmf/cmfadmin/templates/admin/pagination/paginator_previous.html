{% load cmf_tags %}
{% if enabled %}
    <li class="page-item">
        <a class="page-link" role="button" href="{{ url }}">
            {% sprite 'tabler-chevron-left' 'icon' 24 %}
        </a>
    </li>
{% else %}
    <li class="page-item disabled">
        <a class="page-link" href="#" tabindex="-1" aria-disabled="true">
            {% sprite 'tabler-chevron-left' 'icon' 24 %}
        </a>
    </li>
{% endif %}
